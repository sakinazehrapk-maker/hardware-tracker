<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardware Asset Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 12px auto;">
      <h1 style="margin: 0;">Equipment Tracker</h1>
      <button id="theme-toggle-btn" style="background: transparent; border: 1px solid #cbd5e0; color: inherit; padding: 6px 12px; font-size: 0.9rem; cursor: pointer;">
        Dark Mode
      </button>
    </div>
    <p>Manage component check-outs</p>
  </header>
  <main>
    <main>
    <section class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Total Equipment</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Available</span>
        <span class="stat-value stat-available" id="stat-available">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Checked Out</span>
        <span class="stat-value stat-checkout" id="stat-checkedout">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Overdue</span>
        <span class="stat-value stat-overdue" id="stat-overdue">0</span>
      </div>
    </section>
    <section class="card">
      <h2>Add New Equipment</h2>
      <form id="add-equipment-form">
        <input type="text" id="item-name" placeholder="Item Name (e.g., Oscilloscope)" required>
        <input type="text" id="asset-id" placeholder="Asset ID (e.g., OSC-01)" required>
        <select id="item-category" required style="padding: 10px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--card-bg); color: var(--text-color);">
          <option value="Microcontrollers">Microcontrollers</option>
          <option value="Testing Gear">Testing Gear</option>
          <option value="Sensors">Sensors</option>
          <option value="Tools & Components">Tools & Components</option>
          <option value="General">General</option>
        </select>
        <button type="submit">Add Equipment</button>
      </form>
    </section>
    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h2 style="margin-bottom: 0;">Equipment List</h2>
        <button id="export-btn" style="background-color: #2b6cb0; font-size: 0.85rem; padding: 6px 12px;">
          Export CSV
        </button>
      </div>
      <div id="category-chips" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;">
      </div>
      <div style="margin-bottom: 16px;">
        <input type="text" id="search-input" placeholder="🔍 Search equipment, Asset ID, or borrower..." style="width: 100%;">
      </div>
      <ul id="equipment-list">
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
