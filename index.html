<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardware Asset Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Hardware Tracker</h1>
    <p>Manage component check-outs</p>
  </header>
  <main>
    <section class="card">
      <h2>Add New Equipment</h2>
      <form id="add-equipment-form">
        <input type="text" id="item-name" placeholder="Item Name (e.g., Oscilloscope)" required>
        <input type="text" id="asset-id" placeholder="Asset ID (e.g., OSC-01)" required>
        <button type="submit">Add Equipment</button>
      </form>
    </section>
    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h2 style="margin-bottom: 0;">Equipment List</h2>
        <button id="export-btn" style="background-color: #2b6cb0; font-size: 0.85rem; padding: 6px 12px;">
          Export CSV
        </button>
      </div>
      <div style="margin-bottom: 16px;">
        <input type="text" id="search-input" placeholder=" Search equipment, Asset ID, or borrower..." style="width: 100%;">
      </div>
      <ul id="equipment-list">
      </ul>
    </section>
    <section class="card">
      <h2>Equipment List</h2>
      <ul id="equipment-list">
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
